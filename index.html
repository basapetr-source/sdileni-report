let selectedYear = 'all';
let selectedMonth = 'all'; // 'all' or '01','02',...'12'

function fmt(n) {
  const parts = n.toFixed(2).split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
  return parts.join(',');
}
function effClass(pct) { return pct >= 50 ? 'eff-high' : pct >= 20 ? 'eff-mid' : 'eff-low'; }

// Derive unique years from months
const years = [...new Set(months.map(m => m.split('-')[0]))].sort();
const monthNames = ['', 'Leden', 'Únor', 'Březen', 'Duben', 'Květen', 'Červen',
  'Červenec', 'Srpen', 'Září', 'Říjen', 'Listopad', 'Prosinec'];
function ownerClass(o) {
  if (o.includes('MPP')) return 'owner-mpp';
  if (o.includes('nadační') || o.includes('PNF') || o.includes('Polabský')) return 'owner-pnf';
  if (o.includes('TNM')) return 'owner-tnm';
  if (o.includes('Báša')) return 'owner-basa';
  return 'owner-default';
}
function ownerTag(o) { return '<span class="owner-tag ' + ownerClass(o) + '">' + o + '</span>'; }
function eanLabel(ean) {
  if (consumers[ean]) return consumers[ean].name;
  if (producers[ean]) return producers[ean].name;
  return ean.slice(-6);
}
function eanOwner(ean) {
  if (consumers[ean]) return consumers[ean].owner;
  if (producers[ean]) return producers[ean].owner;
  return 'Neznámý';
}

function getMonths() {
  return months.filter(m => {
    const [y, mo] = m.split('-');
    if (selectedYear !== 'all' && y !== selectedYear) return false;
    if (selectedMonth !== 'all' && mo !== selectedMonth) return false;
    return true;
  });
}

function isFiltered() {
  return selectedYear !== 'all' || selectedMonth !== 'all';
}

function getVisibleMonthColumns() {
  // Months shown as individual columns in tables (when not filtered to single month)
  if (selectedYear !== 'all' && selectedMonth === 'all') {
    return months.filter(m => m.startsWith(selectedYear));
  }
  if (selectedYear === 'all' && selectedMonth === 'all') {
    return months;
  }
  return [];
}

function sumOverMonths(statsObj, ean, field) {
  let total = 0;
  for (const m of getMonths()) {
    if (statsObj[ean] && statsObj[ean][m]) total += statsObj[ean][m][field];
  }
  return total;
}

function renderAll() {
  renderSummary();
  renderFilters();
  renderProducers();
  renderConsumers();
  renderOwnerProd();
  renderOwnerCons();
  renderOwnerFlow();
  renderDetailAlloc();
  if (optData) renderOptimization();
}

function renderFilters() {
  // Year filter
  const yearEl = document.getElementById('year-filter');
  let yHtml = '<span class="filter-label">Rok:</span>';
  yHtml += '<button class="month-btn ' + (selectedYear === 'all' ? 'active' : '') + '" onclick="selectYear(\'all\')">Vše</button>';
  for (const y of years) {
    yHtml += '<button class="month-btn ' + (selectedYear === y ? 'active' : '') + '" onclick="selectYear(\'' + y + '\')">' + y + '</button>';
  }
  yearEl.innerHTML = yHtml;

  // Month filter - show months relevant to selected year (or all unique months)
  const monthEl = document.getElementById('month-filter');
  const relevantMonthNums = new Set();
  for (const m of months) {
    const [y, mo] = m.split('-');
    if (selectedYear === 'all' || y === selectedYear) relevantMonthNums.add(mo);
  }
  const sortedMonthNums = [...relevantMonthNums].sort();

  let mHtml = '<span class="filter-label">Měsíc:</span>';
  mHtml += '<button class="month-btn ' + (selectedMonth === 'all' ? 'active' : '') + '" onclick="selectMonthNum(\'all\')">Vše</button>';
  for (const mo of sortedMonthNums) {
    mHtml += '<button class="month-btn ' + (selectedMonth === mo ? 'active' : '') + '" onclick="selectMonthNum(\'' + mo + '\')">' + monthNames[parseInt(mo)] + '</button>';
  }
  monthEl.innerHTML = mHtml;
}

function selectYear(y) { selectedYear = y; selectedMonth = 'all'; renderAll(); }
function selectMonthNum(mo) { selectedMonth = mo; renderAll(); }

function renderSummary() {
  const ms = getMonths();
  let totalProd = 0, totalShared = 0, totalCons = 0, totalReceived = 0;
  for (const m of ms) {
    for (const ean of Object.keys(producerStats)) {
      if (producerStats[ean][m]) { totalProd += producerStats[ean][m].production; totalShared += producerStats[ean][m].shared; }
    }
    for (const ean of Object.keys(consumerStats)) {
      if (consumerStats[ean][m]) { totalCons += consumerStats[ean][m].consumption; totalReceived += consumerStats[ean][m].received; }
    }
  }
  const prodEff = totalProd > 0 ? (totalShared / totalProd * 100) : 0;
  const consEff = totalCons > 0 ? (totalReceived / totalCons * 100) : 0;

  document.getElementById('summary-cards').innerHTML =
    '<div class="card-group"><div class="group-title">Výroba</div><div class="metrics">' +
      '<div class="metric blue"><div class="label">Celková výroba</div><div class="value">' + fmt(totalProd) + ' <span class="unit">kWh</span></div></div>' +
      '<div class="metric green"><div class="label">Nasdíleno</div><div class="value">' + fmt(totalShared) + ' <span class="unit">kWh</span></div></div>' +
      '<div class="metric orange"><div class="label">Efektivita</div><div class="value">' + fmt(prodEff) + ' <span class="unit">%</span></div></div>' +
    '</div></div>' +
    '<div class="card-group"><div class="group-title">Spotřeba</div><div class="metrics">' +
      '<div class="metric purple"><div class="label">Celková spotřeba</div><div class="value">' + fmt(totalCons) + ' <span class="unit">kWh</span></div></div>' +
      '<div class="metric green"><div class="label">Přijato sdílením</div><div class="value">' + fmt(totalReceived) + ' <span class="unit">kWh</span></div></div>' +
      '<div class="metric orange"><div class="label">Pokrytí</div><div class="value">' + fmt(consEff) + ' <span class="unit">%</span></div></div>' +
    '</div></div>';
}

function renderProducers() {
  const ms = getMonths();
  const eans = Object.keys(producerStats).sort((a, b) => eanLabel(a).localeCompare(eanLabel(b)));
  let html = '<table><thead><tr><th>Výrobna</th><th>Vlastník</th>';
  const visCols = getVisibleMonthColumns(); for (const m of visCols) html += '<th class="num">' + monthLabels[m] + '</th>';
  html += '<th class="num">Výroba (kWh)</th><th class="num">Nasdíleno (kWh)</th><th class="num">Přebytek (kWh)</th><th class="num">Efektivita</th></tr></thead><tbody>';

  let totProd = 0, totShared = 0, totSurplus = 0;
  for (const ean of eans) {
    const prod = sumOverMonths(producerStats, ean, 'production');
    const shared = sumOverMonths(producerStats, ean, 'shared');
    const surplus = sumOverMonths(producerStats, ean, 'surplus');
    const eff = prod > 0 ? shared / prod * 100 : 0;
    totProd += prod; totShared += shared; totSurplus += surplus;

    html += '<tr><td>' + eanLabel(ean) + '</td><td>' + ownerTag(eanOwner(ean)) + '</td>';
    for (const m of visCols) {
      const s = producerStats[ean][m] ? producerStats[ean][m].shared : 0;
      html += '<td class="num">' + fmt(s) + '</td>';
    }
    html += '<td class="num">' + fmt(prod) + '</td><td class="num">' + fmt(shared) + '</td><td class="num">' + fmt(surplus) + '</td>';
    html += '<td class="num eff ' + effClass(eff) + '">' + fmt(eff) + ' %</td></tr>';
  }

  const totEff = totProd > 0 ? totShared / totProd * 100 : 0;
  html += '<tr class="total-row"><td><strong>Celkem</strong></td><td></td>';
  for (const m of visCols) {
    let mShared = 0;
    for (const ean of eans) { if (producerStats[ean][m]) mShared += producerStats[ean][m].shared; }
    html += '<td class="num">' + fmt(mShared) + '</td>';
  }
  html += '<td class="num">' + fmt(totProd) + '</td><td class="num">' + fmt(totShared) + '</td><td class="num">' + fmt(totSurplus) + '</td>';
  html += '<td class="num eff ' + effClass(totEff) + '">' + fmt(totEff) + ' %</td></tr>';
  html += '</tbody></table>';
  document.getElementById('producers-table').innerHTML = html;
}

function renderConsumers() {
  const ms = getMonths();
  const eans = Object.keys(consumerStats).sort((a, b) => eanOwner(a).localeCompare(eanOwner(b)) || eanLabel(a).localeCompare(eanLabel(b)));
  let html = '<table><thead><tr><th>Odběrné místo</th><th>Vlastník</th>';
  const visCols = getVisibleMonthColumns(); for (const m of visCols) html += '<th class="num">' + monthLabels[m] + '</th>';
  html += '<th class="num">Spotřeba (kWh)</th><th class="num">Nasdíleno (kWh)</th><th class="num">Ze sítě (kWh)</th><th class="num">Pokrytí</th></tr></thead><tbody>';

  let totCons = 0, totReceived = 0, totGrid = 0;
  for (const ean of eans) {
    const cons = sumOverMonths(consumerStats, ean, 'consumption');
    const received = sumOverMonths(consumerStats, ean, 'received');
    const grid = sumOverMonths(consumerStats, ean, 'fromGrid');
    const eff = cons > 0 ? received / cons * 100 : 0;
    totCons += cons; totReceived += received; totGrid += grid;

    html += '<tr><td>' + eanLabel(ean) + '</td><td>' + ownerTag(eanOwner(ean)) + '</td>';
    for (const m of visCols) {
      const r = consumerStats[ean][m] ? consumerStats[ean][m].received : 0;
      html += '<td class="num">' + fmt(r) + '</td>';
    }
    html += '<td class="num">' + fmt(cons) + '</td><td class="num">' + fmt(received) + '</td><td class="num">' + fmt(grid) + '</td>';
    html += '<td class="num eff ' + effClass(eff) + '">' + fmt(eff) + ' %</td></tr>';
  }

  const totEff = totCons > 0 ? totReceived / totCons * 100 : 0;
  html += '<tr class="total-row"><td><strong>Celkem</strong></td><td></td>';
  for (const m of visCols) {
    let mRcv = 0;
    for (const ean of eans) { if (consumerStats[ean][m]) mRcv += consumerStats[ean][m].received; }
    html += '<td class="num">' + fmt(mRcv) + '</td>';
  }
  html += '<td class="num">' + fmt(totCons) + '</td><td class="num">' + fmt(totReceived) + '</td><td class="num">' + fmt(totGrid) + '</td>';
  html += '<td class="num eff ' + effClass(totEff) + '">' + fmt(totEff) + ' %</td></tr>';
  html += '</tbody></table>';
  document.getElementById('consumers-table').innerHTML = html;
}

function renderOwnerProd() {
  const visCols = getVisibleMonthColumns();
  const ms = getMonths();
  let html = '<table><thead><tr><th>Vlastník</th>';
  for (const m of visCols) html += '<th class="num">' + monthLabels[m] + ' (kWh)</th>';
  html += '<th class="num">Celkem výroba</th><th class="num">Celkem nasdíleno</th><th class="num">Efektivita</th></tr></thead><tbody>';

  for (const owner of owners) {
    let hasData = false;
    for (const m of ms) { if (ownerProduction[owner][m] && ownerProduction[owner][m].production > 0) hasData = true; }
    if (!hasData) continue;

    let totalProd = 0, totalShared = 0;
    html += '<tr><td>' + ownerTag(owner) + '</td>';
    for (const m of visCols) {
      const d = ownerProduction[owner][m] || {shared:0,production:0};
      html += '<td class="num">' + fmt(d.shared) + ' / ' + fmt(d.production) + '</td>';
    }
    for (const m of ms) {
      const d = ownerProduction[owner][m] || {production:0,shared:0};
      totalProd += d.production; totalShared += d.shared;
    }
    const eff = totalProd > 0 ? totalShared / totalProd * 100 : 0;
    html += '<td class="num">' + fmt(totalProd) + '</td><td class="num">' + fmt(totalShared) + '</td>';
    html += '<td class="num eff ' + effClass(eff) + '">' + fmt(eff) + ' %</td></tr>';
  }
  html += '</tbody></table>';
  document.getElementById('tab-owner-prod').innerHTML = html;
}

function renderOwnerCons() {
  const visCols = getVisibleMonthColumns();
  const ms = getMonths();
  let html = '<table><thead><tr><th>Vlastník</th>';
  for (const m of visCols) html += '<th class="num">' + monthLabels[m] + ' (kWh)</th>';
  html += '<th class="num">Celkem spotřeba</th><th class="num">Celkem přijato</th><th class="num">Pokrytí</th></tr></thead><tbody>';

  for (const owner of owners) {
    let hasData = false;
    for (const m of ms) { if (ownerConsumption[owner][m] && ownerConsumption[owner][m].consumption > 0) hasData = true; }
    if (!hasData) continue;

    let totalCons = 0, totalRcv = 0;
    html += '<tr><td>' + ownerTag(owner) + '</td>';
    for (const m of visCols) {
      const d = ownerConsumption[owner][m] || {received:0,consumption:0};
      html += '<td class="num">' + fmt(d.received) + ' / ' + fmt(d.consumption) + '</td>';
    }
    for (const m of ms) {
      const d = ownerConsumption[owner][m] || {consumption:0,received:0};
      totalCons += d.consumption; totalRcv += d.received;
    }
    const eff = totalCons > 0 ? totalRcv / totalCons * 100 : 0;
    html += '<td class="num">' + fmt(totalCons) + '</td><td class="num">' + fmt(totalRcv) + '</td>';
    html += '<td class="num eff ' + effClass(eff) + '">' + fmt(eff) + ' %</td></tr>';
  }
  html += '</tbody></table>';
  document.getElementById('tab-owner-cons').innerHTML = html;
}

function renderOwnerFlow() {
  const ms = getMonths();
  const srcOwners = Object.keys(ownerAllocMatrix).sort();
  const allDstOwners = new Set();
  for (const src of srcOwners) { for (const dst of Object.keys(ownerAllocMatrix[src])) allDstOwners.add(dst); }
  const dstOwners = [...allDstOwners].sort();

  let html = '<table class="flow-matrix"><thead><tr><th>Zdroj \\ Příjemce</th>';
  for (const dst of dstOwners) html += '<th class="num">' + dst + '</th>';
  html += '<th class="num"><strong>Celkem odesláno</strong></th></tr></thead><tbody>';

  for (const src of srcOwners) {
    html += '<tr><td><strong>' + src + '</strong></td>';
    let rowTotal = 0;
    for (const dst of dstOwners) {
      let val = 0;
      for (const m of ms) {
        if (ownerAllocMatrix[src][dst] && ownerAllocMatrix[src][dst][m]) val += ownerAllocMatrix[src][dst][m];
      }
      rowTotal += val;
      html += '<td class="num' + (val > 0 ? ' highlight' : '') + '">' + (val > 0 ? fmt(val) : '-') + '</td>';
    }
    html += '<td class="num total-row">' + fmt(rowTotal) + '</td></tr>';
  }

  // Total received row
  html += '<tr class="total-row"><td><strong>Celkem přijato</strong></td>';
  for (const dst of dstOwners) {
    let colTotal = 0;
    for (const src of srcOwners) {
      for (const m of ms) {
        if (ownerAllocMatrix[src][dst] && ownerAllocMatrix[src][dst][m]) colTotal += ownerAllocMatrix[src][dst][m];
      }
    }
    html += '<td class="num">' + fmt(colTotal) + '</td>';
  }
  html += '<td class="num"></td></tr>';

  html += '</tbody></table>';
  document.getElementById('owner-flow-table').innerHTML = html;
}

function renderDetailAlloc() {
  const ms = getMonths();
  const visCols = getVisibleMonthColumns();
  const srcEans = Object.keys(detailAlloc).sort((a,b) => eanLabel(a).localeCompare(eanLabel(b)));
  let html = '<table><thead><tr><th>Zdroj</th><th>Vlastník zdroje</th><th>Odběrné místo</th><th>Vlastník odběru</th>';
  for (const m of visCols) html += '<th class="num">' + monthLabels[m] + '</th>';
  html += '<th class="num">Celkem (kWh)</th></tr></thead><tbody>';

  for (const srcEan of srcEans) {
    const dstEans = Object.keys(detailAlloc[srcEan]).sort((a,b) => eanLabel(a).localeCompare(eanLabel(b)));
    for (const dstEan of dstEans) {
      let total = 0;
      for (const m of ms) { total += detailAlloc[srcEan][dstEan][m] || 0; }
      if (total === 0) continue;

      html += '<tr><td>' + eanLabel(srcEan) + '</td><td>' + ownerTag(eanOwner(srcEan)) + '</td>';
      html += '<td>' + eanLabel(dstEan) + '</td><td>' + ownerTag(eanOwner(dstEan)) + '</td>';
      for (const m of visCols) {
        const v = detailAlloc[srcEan][dstEan][m] || 0;
        html += '<td class="num">' + (v > 0 ? fmt(v) : '-') + '</td>';
      }
      html += '<td class="num"><strong>' + fmt(total) + '</strong></td></tr>';
    }
  }
  html += '</tbody></table>';
  document.getElementById('detail-alloc-table').innerHTML = html;
}

function showTab(id) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  event.target.classList.add('active');
}

function renderOptimization() {
  var sec = document.getElementById('optimization-section');
  sec.style.display = '';
  var s = optData.summary;
  var cardsHtml =
    '<div class="card-group"><div class="group-title">Současné nastavení</div><div class="metrics">' +
      '<div class="metric blue"><div class="label">Nasdíleno</div><div class="value">' + fmt(s.currentShared) + ' <span class="unit">kWh</span></div></div>' +
      '<div class="metric orange"><div class="label">Efektivita</div><div class="value">' + fmt(s.currentEfficiency) + ' <span class="unit">%</span></div></div>' +
      '<div class="metric"><div class="label">Teor. maximum</div><div class="value">' + fmt(s.theoreticalMax) + ' <span class="unit">kWh</span></div></div>' +
    '</div></div>' +
    '<div class="card-group"><div class="group-title">Po optimalizaci</div><div class="metrics">' +
      '<div class="metric green"><div class="label">Nasdíleno</div><div class="value">' + fmt(s.optimizedShared) + ' <span class="unit">kWh</span></div></div>' +
      '<div class="metric green"><div class="label">Efektivita</div><div class="value">' + fmt(s.optimizedEfficiency) + ' <span class="unit">%</span></div></div>' +
      '<div class="metric green"><div class="label">Zlepšení</div><div class="value">+' + fmt(s.improvement) + ' <span class="unit">kWh (+' + fmt(s.improvementPct) + ' p.b.)</span></div></div>' +
    '</div></div>';
  document.getElementById('optimization-cards').innerHTML = cardsHtml;

  var tHtml = '';
  for (var p = 0; p < optData.perProducer.length; p++) {
    var prod = optData.perProducer[p];
    var prodImpr = prod.optimizedShared - prod.currentShared;
    tHtml += '<h3>' + prod.name + ' <small>(' + prod.owner + ')</small> — ';
    tHtml += fmt(prod.currentShared) + ' &rarr; ' + fmt(prod.optimizedShared) + ' kWh';
    tHtml += ' <span class="eff ' + (prodImpr > 0 ? 'eff-high' : 'eff-mid') + '">(+' + fmt(prodImpr) + ')</span></h3>';
    tHtml += '<table><thead><tr><th>Odběrné místo</th><th>Vlastník</th><th class="num">Současný klíč (%)</th><th class="num">Navrhovaný klíč (%)</th><th class="num">Změna</th></tr></thead><tbody>';
    for (var c = 0; c < prod.consumers.length; c++) {
      var con = prod.consumers[c];
      var curPct = con.currentKey * 100;
      var optPct = con.optimizedKey * 100;
      var diff = optPct - curPct;
      var diffClass = diff > 0.01 ? 'eff-high' : diff < -0.01 ? 'eff-low' : '';
      var diffStr = diff >= 0 ? '+' + fmt(diff) : fmt(diff);
      tHtml += '<tr><td>' + con.name + '</td><td>' + ownerTag(con.owner) + '</td>';
      tHtml += '<td class="num">' + fmt(curPct) + '</td>';
      tHtml += '<td class="num">' + fmt(optPct) + '</td>';
      tHtml += '<td class="num eff ' + diffClass + '">' + diffStr + '</td></tr>';
    }
    tHtml += '</tbody></table>';
  }
  document.getElementById('optimization-tables').innerHTML = tHtml;
}

// Initial render
renderAll();
